<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a56db"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="500" rx="24" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="520" cy="80" r="120" fill="#1a56db" opacity="0.04"/>
  <circle cx="80" cy="420" r="100" fill="#3b82f6" opacity="0.04"/>
  <circle cx="300" cy="250" r="200" fill="#1a56db" opacity="0.02"/>

  <!-- Globe icon -->
  <g transform="translate(300, 220)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="80" fill="white" stroke="#e5e7eb" stroke-width="1"/>
    <!-- Continents -->
    <ellipse cx="-15" cy="-10" rx="20" ry="15" fill="#1a56db" opacity="0.15"/>
    <ellipse cx="20" cy="5" rx="25" ry="18" fill="#059669" opacity="0.15"/>
    <ellipse cx="-5" cy="15" rx="15" ry="12" fill="#d97706" opacity="0.15"/>
    <ellipse cx="5" cy="-15" rx="12" ry="10" fill="#1a56db" opacity="0.15"/>
    <!-- Grid lines -->
    <ellipse cx="0" cy="0" rx="78" ry="40" fill="none" stroke="#e5e7eb" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="78" ry="20" fill="none" stroke="#e5e7eb" stroke-width="0.5"/>
    <line x1="-78" y1="0" x2="78" y2="0" stroke="#e5e7eb" stroke-width="0.5"/>
    <line x1="0" y1="-78" x2="0" y2="78" stroke="#e5e7eb" stroke-width="0.5"/>
  </g>

  <!-- Passport icon (left) -->
  <g transform="translate(160, 140)" filter="url(#shadow)">
    <rect x="-24" y="-32" width="48" height="64" rx="4" fill="white" stroke="#e5e7eb" stroke-width="1"/>
    <circle cx="0" cy="-12" r="8" fill="#1a56db" opacity="0.1"/>
    <circle cx="0" cy="-12" r="4" fill="#1a56db" opacity="0.2"/>
    <rect x="-16" y="4" width="32" height="3" rx="1.5" fill="#e5e7eb"/>
    <rect x="-16" y="12" width="24" height="3" rx="1.5" fill="#e5e7eb"/>
    <rect x="-16" y="20" width="28" height="3" rx="1.5" fill="#e5e7eb"/>
    <!-- Stamp -->
    <circle cx="12" cy="-8" r="8" fill="none" stroke="#059669" stroke-width="1" opacity="0.4"/>
    <text x="12" y="-5" text-anchor="middle" font-size="4" fill="#059669" opacity="0.4">✓</text>
  </g>

  <!-- Plane icon (right) -->
  <g transform="translate(440, 160)" filter="url(#shadow)">
    <g transform="rotate(45)">
      <path d="M0 -30 L6 -10 L24 -6 L24 2 L6 6 L0 26 L-6 6 L-24 2 L-24 -6 L-6 -10 Z" fill="white" stroke="#e5e7eb" stroke-width="1"/>
      <path d="M0 -28 L5 -10 L22 -6 L22 0 L5 4 L0 22 L-5 4 L-22 0 L-22 -6 L-5 -10 Z" fill="#1a56db" opacity="0.12"/>
    </g>
  </g>

  <!-- Visa/checkmark icon (right bottom) -->
  <g transform="translate(440, 340)" filter="url(#shadow)">
    <rect x="-20" y="-20" width="40" height="40" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1"/>
    <path d="M-8 0 L-2 6 L8 -4" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Building/city icon (left bottom) -->
  <g transform="translate(160, 330)" filter="url(#shadow)">
    <rect x="-24" y="-28" width="48" height="48" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="-14" y="-18" width="8" height="14" rx="1" fill="#1a56db" opacity="0.15"/>
    <rect x="-2" y="-22" width="8" height="18" rx="1" fill="#059669" opacity="0.15"/>
    <rect x="10" y="-16" width="8" height="12" rx="1" fill="#d97706" opacity="0.15"/>
    <!-- Windows -->
    <rect x="-12" y="-16" width="4" height="3" rx="0.5" fill="#1a56db" opacity="0.3"/>
    <rect x="-12" y="-10" width="4" height="3" rx="0.5" fill="#1a56db" opacity="0.3"/>
    <rect x="0" y="-20" width="4" height="3" rx="0.5" fill="#059669" opacity="0.3"/>
    <rect x="0" y="-14" width="4" height="3" rx="0.5" fill="#059669" opacity="0.3"/>
    <rect x="12" y="-14" width="4" height="3" rx="0.5" fill="#d97706" opacity="0.3"/>
  </g>

  <!-- Connecting lines -->
  <path d="M196 190 C230 210 260 200 280 190" stroke="#1a56db" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.3" fill="none"/>
  <path d="M404 190 C370 210 340 200 320 190" stroke="#059669" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.3" fill="none"/>
  <path d="M196 360 C230 340 260 330 280 310" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.3" fill="none"/>
  <path d="M404 360 C370 340 340 330 320 310" stroke="#1a56db" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.3" fill="none"/>

  <!-- Floating particles -->
  <circle cx="120" cy="200" r="3" fill="#1a56db" opacity="0.15"/>
  <circle cx="140" cy="280" r="2" fill="#059669" opacity="0.15"/>
  <circle cx="460" cy="280" r="2" fill="#d97706" opacity="0.15"/>
  <circle cx="480" cy="200" r="3" fill="#1a56db" opacity="0.15"/>
  <circle cx="300" cy="120" r="2" fill="#1a56db" opacity="0.1"/>
  <circle cx="300" cy="360" r="2" fill="#059669" opacity="0.1"/>
  <circle cx="200" cy="420" r="1.5" fill="#d97706" opacity="0.12"/>
  <circle cx="420" cy="100" r="2" fill="#1a56db" opacity="0.12"/>
</svg>
