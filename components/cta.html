<!-- ============================================================
  CTA Component — Reusable
  Usage:
    <div data-component="cta"
         data-title="Ready to Get Started?"
         data-text="Let us handle your visa needs — fast, reliable, and hassle-free."
         data-btn-primary="Apply Now"
         data-btn-primary-url="/apply/"
         data-btn-ghost="Contact Us"
         data-btn-ghost-url="/contact-us/">
    </div>
  ============================================================ -->
<section class="cta section" role="region" aria-label="Call to action" data-cta>
  <div class="container">
    <h2 class="cta__title" data-cta-title>Ready to Get Started?</h2>
    <p class="cta__text" data-cta-text>
      Let us handle your visa needs — fast, reliable, and hassle-free.
    </p>
    <div class="cta__actions">
      <a href="#" class="btn btn--primary btn--lg" data-cta-btn-primary>Apply Now</a>
      <a href="#" class="btn btn--ghost btn--lg" data-cta-btn-ghost>Contact Us</a>
    </div>
  </div>
</section>
