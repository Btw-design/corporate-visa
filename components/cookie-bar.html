<!-- ============================================================
  Cookie Consent Bar Component
  ============================================================ -->
<div class="cookie-bar" role="dialog" aria-label="Cookie consent" data-cookie-bar>
  <div class="container cookie-bar__inner">
    <p class="cookie-bar__text">
      We use cookies to improve your experience. By continuing to browse, you agree to our
      <a href="/corporate-visa/privacy-policy/" class="footer__legal-link" style="color: #0ea5e9; text-decoration: underline;">Cookie Policy</a>.
    </p>
    <div class="cookie-bar__actions">
      <button class="btn btn--ghost btn--sm" type="button" data-cookie-decline style="color: #fff; border-color: rgba(255,255,255,0.3);">Decline</button>
      <button class="btn btn--primary btn--sm" type="button" data-cookie-accept>Accept All</button>
    </div>
  </div>
</div>
